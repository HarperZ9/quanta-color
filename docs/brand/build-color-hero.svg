<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Build Color, a Python color-science workbench">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160c28"/>
      <stop offset="1" stop-color="#0a0816"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#ff4d6d"/>
      <stop offset="0.25" stop-color="#ffb84d"/>
      <stop offset="0.50" stop-color="#38d39f"/>
      <stop offset="0.75" stop-color="#4d8bff"/>
      <stop offset="1.00" stop-color="#a15bff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#hero-bg)"/>
  <!-- spectral band -->
  <rect x="80" y="250" width="1040" height="10" rx="5" fill="url(#spectrum)" opacity="0.9"/>
  <!-- gamut triangle motif -->
  <g transform="translate(980,180)" opacity="0.85">
    <polygon points="0,-90 78,55 -78,55" fill="none" stroke="#4636e8" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="0" cy="-90" r="12" fill="#ff4d6d"/>
    <circle cx="78" cy="55" r="12" fill="#38d39f"/>
    <circle cx="-78" cy="55" r="12" fill="#4d8bff"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff"/>
  </g>
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Build Color</text>
  <text x="82" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" fill="#b8b0d8">A Python color-science workbench — spaces, tone mapping, appearance, ΔE, spectral, ICC, LUT.</text>
</svg>
